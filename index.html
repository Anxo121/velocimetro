<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SIMULATOR PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    background: #111;
    color: white;
    font-family: Arial;
    margin: 0;
    overflow: hidden;
}

/* Panel del simulador */
#container {
    text-align: center;
    margin-top: 40px;
}

/* Perfil arriba derecha */
#perfil-info {
    position: fixed;
    top: 10px;
    right: 10px;
    background: rgba(0,0,0,0.6);
    padding: 12px 18px;
    border-radius: 10px;
    color: #fff;
    font-family: Arial;
    text-align: right;
    z-index: 9999;
    font-size: 14px;
}
</style>
</head>

<body>

<!-- PERFIL ARRIBA DERECHA -->
<div id="perfil-info">
    <div><strong>Tiempo aquí:</strong> <span id="tiempo-uso">0s</span></div>
    <div><strong>Total acumulado:</strong> <span id="tiempo-total">0s</span></div>
    <div><strong>Entradas:</strong> <span id="contador-entradas">0</span></div>
</div>

<!-- TU SIMULADOR ORIGINAL -->
<div id="container">
    <h1>SIMULATOR PRO</h1>

    <p>Velocidad: <span id="vel">0</span> km/h</p>
    <p>RPM: <span id="rpm">0</span></p>
    <p>Marcha: <span id="gear">N</span></p>

    <div>
        <button onclick="shiftDown()">◀</button>
        <button onclick="accelerate()">▲</button>
        <button onclick="brake()">▼</button>
        <button onclick="shiftUp()">▶</button>
    </div>
</div>

<script>
// ------------------------------
// LÓGICA DEL SIMULADOR
// ------------------------------
let speed = 0;
let rpm = 0;
let gear = 0;

function update() {
    document.getElementById("vel").textContent = speed;
    document.getElementById("rpm").textContent = rpm;
    document.getElementById("gear").textContent = gear === 0 ? "N" : gear;
}

function accelerate() {
    speed += 2;
    rpm += 150;
    update();
}

function brake() {
    speed = Math.max(0, speed - 3);
    rpm = Math.max(0, rpm - 200);
    update();
}

function shiftUp() {
    gear++;
    update();
}

function shiftDown() {
    gear = Math.max(0, gear - 1);
    update();
}

// ------------------------------
// PERFIL: TIEMPO Y ENTRADAS
// ------------------------------

function formatearTiempo(segundos) {
    let h = Math.floor(segundos / 3600);
    let m = Math.floor((segundos % 3600) / 60);
    let s = segundos % 60;

    let texto = "";
    if (h > 0) texto += h + "h ";
    if (m > 0) texto += m + "m ";
    texto += s + "s";

    return texto.trim();
}

// Contador de entradas
let visitas = localStorage.getItem("contadorEntradas");
visitas = visitas ? parseInt(visitas) + 1 : 1;
localStorage.setItem("contadorEntradas", visitas);
document.getElementById("contador-entradas").textContent = visitas;

// Tiempo acumulado
let tiempoTotal = localStorage.getItem("tiempoTotal");
tiempoTotal = tiempoTotal ? parseInt(tiempoTotal) : 0;
document.getElementById("tiempo-total").textContent = formatearTiempo(tiempoTotal);

// Tiempo de la visita actual
let segundos = 0;

setInterval(() => {
    segundos++;

    document.getElementById("tiempo-uso").textContent = formatearTiempo(segundos);

    localStorage.setItem("tiempoTotal", tiempoTotal + segundos);
    document.getElementById("tiempo-total").textContent = formatearTiempo(tiempoTotal + segundos);

}, 1000);
</script>

</body>
</html>
